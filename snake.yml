name: generate-snake-game-from-github-contribution-grid

on:
  schedule:
    - cron: "0 0 * * *" # roda todo dia à meia-noite (UTC)
  workflow_dispatch: {} # permite rodar manualmente
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%23e11111&color_dots=%231a1a1a,%23552222,%23992222,%23cc1111,%23ff4d4d
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23ff4d4d&color_dots=%231a1a1a,%23552222,%23992222,%23cc1111,%23ff4d4d

      - name: push github-snake output to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
